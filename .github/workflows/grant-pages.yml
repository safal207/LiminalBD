name: Grant Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/index.html
      - docs/grants/nlnet-commons.html
      - docs/grant-landing.html
      - .github/workflows/grant-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: grant-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static page
        run: |
          mkdir -p _site/grants
          cp docs/index.html _site/index.html
          cp docs/grants/nlnet-commons.html _site/grants/nlnet-commons.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
